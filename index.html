    };

    let currentLang = 'ja';
    let currentTheme = 'dark';
    let showingDetail = false;
    let currentCourse = null;
    const mainDiv = document.getElementById('mainContent');

    function setTheme(theme) {
      document.body.classList.remove('dark', 'light');
      document.body.classList.add(theme);
      currentTheme = theme;
      const btn = document.getElementById('themeBtn');
      btn.innerHTML = theme === 'dark' ? '☀️ ライトモード' : '🌙 ダークモード';
      localStorage.setItem('golf_theme', theme);
    }

    function setLanguage(lang) {
      currentLang = lang;
      document.getElementById('page-title').innerText = i18n[lang].title;
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (i18n[lang][key]) el.innerText = i18n[lang][key];
      });
      localStorage.setItem('golf_lang', lang);
      renderCurrentView();
    }

    function renderSponsorBlock(position = 'top') {
      return `
        <div class="sponsor">
          <img src="https://placehold.co/200x80/2c7a4d/white?text=Sponsor+Logo" alt="sponsor">
          <span>${i18n[currentLang].sponsorText} ${position === 'top' ? '上部' : '下部'}</span>
          <a href="#" target="_blank">${i18n[currentLang].visitSite} →</a>
        </div>
      `;
    }

    function renderBottomMap() {
      const container = document.getElementById('bottomMapContainer');
      if (!container) return;
      const lang = currentLang;
      container.innerHTML = `
        <div class="map-container bottom-map">
          <iframe width="100%" height="100%" frameborder="0" style="border:0" 
            src="https://www.google.com/maps/embed/v1/place?key=YOUR_GOOGLE_MAPS_API_KEY&q=石川IC+沖縄&zoom=10&language=${lang}"
            allowfullscreen loading="lazy"></iframe>
        </div>
      `;
    }

    function renderList() {
      let html = renderSponsorBlock('top');
      html += `<div class="golf-list">`;
      courses.forEach(course => {
        const name = currentLang === 'ja' ? course.nameJa : course.nameEn;
        const addr = course.address;
        let addrShort = addr.split(' ').slice(1,3).join(' ');
        if (addrShort.length > 30) addrShort = addrShort.substring(0, 30) + '...';
        html += `
          <div class="card" data-id="${course.id}">
            <div class="card-header">
              <span class="rank">#${course.rank}</span>
              <span class="course-name">${escapeHtml(name)}</span>
            </div>
            <div class="feature">📍 ${escapeHtml(addrShort)}</div>
            <div class="badge">🏝️ ${currentLang === 'ja' ? 'アクセス良好' : 'Good access'}</div>
          </div>
        `;
      });
      html += `</div>`;
      html += renderSponsorBlock('bottom');
      html += `<div id="bottomMapContainer" class="bottom-map"></div>`;
      mainDiv.innerHTML = html;

      document.querySelectorAll('.card').forEach(card => {
        card.addEventListener('click', (e) => {
          const id = parseInt(card.getAttribute('data-id'));
          const course = courses.find(c => c.id === id);
          if (course) showDetail(course);
        });
      });
      renderBottomMap();
    }

    function escapeHtml(str) {
      return str ? str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
      }) : '';
    }

    function showDetail(course) {
      showingDetail = true;
      currentCourse = course;
      const lang = currentLang;
      const name = lang === 'ja' ? course.nameJa : course.nameEn;
      const desc = lang === 'ja' ? course.descJa : course.descEn;
      const access = lang === 'ja' ? course.accessJa : course.accessEn;
      const address = course.address;
      const nearby = lang === 'ja' ? course.nearbyJa : course.nearbyEn;

      const html = `
        <div class="detail-view">
          <button id="backToListBtn" class="btn-secondary back-btn">${i18n[lang].detailBack}</button>
          <h2>${escapeHtml(name)}</h2>
          <img class="detail-image" src="${course.imagePlaceholder}" alt="${escapeHtml(name)}" loading="lazy" onerror="this.src='https://placehold.co/800x400/2c7a4d/white?text=Golf+Course'">
          <p><strong>📝 ${lang === 'ja' ? 'コース紹介' : 'Description'}</strong><br>${escapeHtml(desc)}</p>
          <p><strong>📍 ${lang === 'ja' ? '所在地' : 'Address'}</strong><br>${escapeHtml(address)}</p>
          <div style="margin-top: 1rem;">
            <strong>🚗 ${lang === 'ja' ? 'アクセス' : 'Access'}</strong><br>${escapeHtml(access)}<br><br>
            <strong>🏨 ${lang === 'ja' ? '周辺観光・宿泊' : 'Tourism & Hotels'}</strong><br>${escapeHtml(nearby)}
          </div>
          <a href="${course.officialUrl}" target="_blank" rel="noopener noreferrer" class="official-link">${i18n[lang].officialHome} ↗</a>
          <div class="map-container" id="detailMap"></div>
        </div>
      `;
      mainDiv.innerHTML = html;

      document.getElementById('backToListBtn').addEventListener('click', () => {
        showingDetail = false;
        renderList();
      });

      setTimeout(() => {
        const mapDiv = document.getElementById('detailMap');
        if (mapDiv) {
          const lat = course.mapLat || 26.395;
          const lng = course.mapLng || 127.745;
          mapDiv.innerHTML = `<iframe width="100%" height="100%" frameborder="0" style="border:0" 
            src="https://www.google.com/maps/embed/v1/place?key=YOUR_GOOGLE_MAPS_API_KEY&q=${lat},${lng}&zoom=12&language=${lang}"
            allowfullscreen loading="lazy"></iframe>`;
        }
      }, 50);
    }

    function renderCurrentView() {
      if (showingDetail && currentCourse) {
        showDetail(currentCourse);
      } else {
        renderList();
      }
    }

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').then(reg => {
          console.log('Service Worker registered:', reg);
        }).catch(err => {
          console.error('SW registration failed:', err);
        });
      });
    }

    function initApp() {
      const savedTheme = localStorage.getItem('golf_theme');
      if (savedTheme === 'light') setTheme('light');
      else setTheme('dark');

      const savedLang = localStorage.getItem('golf_lang');
      if (savedLang === 'en') setLanguage('en');
      else setLanguage('ja');

      document.getElementById('langBtn').addEventListener('click', () => {
        const newLang = currentLang === 'ja' ? 'en' : 'ja';
        setLanguage(newLang);
      });
      document.getElementById('themeBtn').addEventListener('click', () => {
        const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
        setTheme(newTheme);
      });

      renderList();
    }

    initApp();
  </script>
</body>
</html>
