  <style>
    * {

    body.dark {
      background-color: #0f1720;
      color: #e2e8f0;
    }
    body.dark .card {
      background-color: #1e2937;
      border-color: #334155;
    }
    body.dark .btn-secondary {
      background-color: #334155;
      color: #f1f5f9;
    }
    body.dark .sponsor {
      background-color: #1e2937;
      border-color: #475569;
    }
    /* クリアモード（ライト） */
    body.light {
      background-color: #f8fafc;
      color: #0f172a;
    }

      background-color: #ffffff;
      border-color: #cbd5e1;
    }

      background-color: #e2e8f0;

    }

      border-color: #cbd5e1;

    }

      width: 100%;

      background-color: rgba(0, 0, 0, 0.05);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
    body.dark header, body.dark footer {

      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }
    button {
      background: none;
      border: none;
      cursor: pointer;
      padding: 0.5rem 1rem;
      border-radius: 2rem;
      font-weight: 500;
      font-size: 0.9rem;
      transition: opacity 0.2s;
    }
    button:active {
      opacity: 0.7;
    }
    .btn-primary {
      background-color: #2c7a4d;
      color: white;
    }
    .btn-secondary {
      background-color: #e2e8f0;
      color: #1e293b;
    }
    h1 {
      font-size: 1.8rem;
      margin-bottom: 0.25rem;
    }
    .sub {
      color: #5b6e8c;
      margin-bottom: 1.5rem;
    }
    body.dark .sub {
      color: #94a3b8;
    }
    .sponsor {
      border: 1px solid;
      border-radius: 2rem;
      padding: 1rem 1.5rem;
      margin: 1.5rem 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
    }
    .sponsor img {
      max-height: 60px;
      border-radius: 12px;
    }
    .sponsor a {
      color: #2c7a4d;
      text-decoration: none;
      font-weight: bold;
    }
    .golf-list {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      margin: 1.5rem 0;
    }
    .card {
      border: 1px solid;
      border-radius: 1.5rem;
      padding: 1rem 1.5rem;
      cursor: pointer;
      transition: transform 0.1s ease, box-shadow 0.2s;
    }
    .card:active {
      transform: scale(0.99);
    }
    .card-header {
      display: flex;
      align-items: baseline;
      gap: 0.75rem;
      flex-wrap: wrap;
      margin-bottom: 0.5rem;
    }
    .rank {
      font-weight: bold;
      background-color: #2c7a4d;
      color: white;
      padding: 0.2rem 0.7rem;
      border-radius: 3rem;
      font-size: 0.8rem;
    }
    .course-name {
      font-size: 1.3rem;
      font-weight: 700;
    }
    .feature {
      margin-top: 0.5rem;
    }
    .badge {
      display: inline-block;
      background-color: #cbd5e1;
      color: #0f172a;
      padding: 0.2rem 0.6rem;
      border-radius: 2rem;
      font-size: 0.75rem;
      margin-top: 0.5rem;
    }
    body.dark .badge {
      background-color: #334155;
      color: #e2e8f0;
    }
    .detail-view {
      margin: 1rem 0;
    }
    .detail-image {
      width: 100%;
      max-height: 320px;
      object-fit: cover;
      border-radius: 1.5rem;
      margin: 1rem 0;
    }
    .back-btn {
      margin-bottom: 1rem;
    }
    .map-container {
      margin: 2rem 0;
      border-radius: 1.5rem;
      overflow: hidden;
      height: 350px;
    }
    .bottom-map {
      margin-top: 2rem;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: 0;
    }
    .official-link {
      display: inline-block;

      background-color: #2c7a4d;

      border-radius: 2rem;
      text-decoration: none;
    }
    .contact-email {
      color: #2c7a4d;
      text-decoration: none;
      font-weight: 500;
    }
    @media (max-width: 640px) {
      .container {
        padding: 1rem;
      }
      .course-name {
        font-size: 1.1rem;
      }
    }
  </style>
</head>

    // 多言語辞書
    const i18n = {
      ja: {
        title: "🏌️ 沖縄ゴルフリゾートガイド",
        subtitle: "絶景コースとリゾートの調和",
        sponsorTitle: "🏆 スポンサー",
        sponsorText: "このエリアはスポンサーリンクです。",
        visitSite: "公式サイトへ",
        detailBack: "← 一覧に戻る",
        officialHome: "公式ホームページを見る",
        mapLabel: "📍 周辺エリア (石川ICを中心としたマップ)",
        features: "アクセス・周辺情報"
      },
      en: {
        title: "🏌️ Okinawa Golf Resort Guide",
        subtitle: "Scenic Courses & Resort Harmony",
        sponsorTitle: "🏆 Sponsors",
        sponsorText: "This area is for sponsor links.",
        visitSite: "Visit Site",
        detailBack: "← Back to List",
        officialHome: "Official Website",
        mapLabel: "📍 Area Map (Centered on Ishikawa IC)",
        features: "Access & Nearby Info"
      }
    };

    let currentLang = 'ja';
    let currentTheme = 'dark';
    let showingDetail = false;
    let currentCourse = null;
    const mainDiv = document.getElementById('mainContent');

    // テーマ設定
    function setTheme(theme) {
      document.body.classList.remove('dark', 'light');
      document.body.classList.add(theme);
      currentTheme = theme;
      const btn = document.getElementById('themeBtn');
      btn.innerHTML = theme === 'dark' ? '☀️ ライトモード' : '🌙 ダークモード';
      localStorage.setItem('golf_theme', theme);
    }

    // 言語設定
    function setLanguage(lang) {
      currentLang = lang;
      document.getElementById('page-title').innerText = i18n[lang].title;
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (i18n[lang][key]) el.innerText = i18n[lang][key];
      });
      localStorage.setItem('golf_lang', lang);
      renderCurrentView();
    }

    // スポンサーブロック
    function renderSponsorBlock(position = 'top') {
      return `
        <div class="sponsor">
          <img src="https://placehold.co/200x80/2c7a4d/white?text=Sponsor+Logo" alt="sponsor">
          <span>${i18n[currentLang].sponsorText} ${position === 'top' ? '上部' : '下部'}</span>
          <a href="#" target="_blank">${i18n[currentLang].visitSite} →</a>
        </div>
      `;
    }

    // メインページの下部マップ描画
    function renderBottomMap() {
      const container = document.getElementById('bottomMapContainer');
      if (!container) return;
      const lang = currentLang;
      container.innerHTML = `
        <div class="map-container bottom-map">
          <iframe width="100%" height="100%" frameborder="0" style="border:0" 
            src="https://www.google.com/maps/embed/v1/place?key=YOUR_GOOGLE_MAPS_API_KEY&q=石川IC+沖縄&zoom=12&language=${lang}"
            allowfullscreen loading="lazy"></iframe>
        </div>
      `;
    }

    // 一覧表示
    function renderList() {
      let html = renderSponsorBlock('top');
      html += `<div class="golf-list">`;
      courses.forEach(course => {
        const name = currentLang === 'ja' ? course.nameJa : course.nameEn;
        const featureShort = currentLang === 'ja' ? (course.descJa.slice(0, 70) + '...') : (course.descEn.slice(0, 70) + '...');
        html += `
          <div class="card" data-id="${course.id}">
            <div class="card-header">
              <span class="rank">#${course.rank}</span>
              <span class="course-name">${escapeHtml(name)}</span>
            </div>
            <div class="feature">${escapeHtml(featureShort)}</div>
            <div class="badge">🏝️ ${currentLang === 'ja' ? 'アクセス良好' : 'Good access'}</div>
          </div>
        `;
      });
      html += `</div>`;
      html += renderSponsorBlock('bottom');
      html += `<div id="bottomMapContainer" class="bottom-map"></div>`;
      mainDiv.innerHTML = html;
      
      // カードクリック
      document.querySelectorAll('.card').forEach(card => {
        card.addEventListener('click', (e) => {
          const id = parseInt(card.getAttribute('data-id'));
          const course = courses.find(c => c.id === id);
          if (course) showDetail(course);
        });
      });
      renderBottomMap();
    }

    // XSS 対策
    function escapeHtml(str) {
      return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
      });
    }

    // 詳細表示
    function showDetail(course) {
      showingDetail = true;
      currentCourse = course;
      const lang = currentLang;
      const name = lang === 'ja' ? course.nameJa : course.nameEn;
      const desc = lang === 'ja' ? course.descJa : course.descEn;
      const access = lang === 'ja' ? course.accessJa : course.accessEn;
      const nearby = lang === 'ja' ? course.nearbyJa : course.nearbyEn;
      const hotelPart = lang === 'ja' ? (course.nearbyJa.split('宿泊：')[1] || 'リゾートホテル多数') : (course.nearbyEn.split('Hotels:')[1] || 'many resort hotels');
      const sightPart = lang === 'ja' ? (course.nearbyJa.split('宿泊：')[0] || course.nearbyJa) : (course.nearbyEn.split('Hotels:')[0] || course.nearbyEn);
      
      const html = `
        <div class="detail-view">
          <button id="backToListBtn" class="btn-secondary back-btn">${i18n[lang].detailBack}</button>
          <h2>${escapeHtml(name)}</h2>
          <img class="detail-image" src="${course.imagePlaceholder}" alt="${escapeHtml(name)}" loading="lazy" onerror="this.src='https://placehold.co/800x400/2c7a4d/white?text=Golf+Course'">
          <p><strong>📝 ${lang === 'ja' ? 'コース紹介' : 'Description'}</strong><br>${escapeHtml(desc)}</p>
          <div style="margin-top: 1rem;">
            <strong>🚗 ${lang === 'ja' ? 'アクセス' : 'Access'}</strong><br>${escapeHtml(access)}<br><br>
            <strong>🏨 ${lang === 'ja' ? '周辺観光・宿泊' : 'Tourism & Hotels'}</strong><br>${escapeHtml(sightPart)}<br>${lang === 'ja' ? '宿泊' : 'Hotels'}: ${escapeHtml(hotelPart)}
          </div>
          <a href="${course.officialUrl}" target="_blank" rel="noopener noreferrer" class="official-link">${i18n[lang].officialHome} ↗</a>
          <div class="map-container" id="detailMap"></div>
        </div>
      `;
      mainDiv.innerHTML = html;
      
      document.getElementById('backToListBtn').addEventListener('click', () => {
        showingDetail = false;
        renderList();
      });
      
      setTimeout(() => {
        const mapDiv = document.getElementById('detailMap');
        if (mapDiv) {
          const lat = course.mapLat || 26.395;
          const lng = course.mapLng || 127.745;
          mapDiv.innerHTML = `<iframe width="100%" height="100%" frameborder="0" style="border:0" 
            src="https://www.google.com/maps/embed/v1/place?key=YOUR_GOOGLE_MAPS_API_KEY&q=${lat},${lng}&zoom=13&language=${lang}"
            allowfullscreen loading="lazy"></iframe>`;
        }
      }, 50);
    }

    function renderCurrentView() {
      if (showingDetail && currentCourse) {
        showDetail(currentCourse);
      } else {
        renderList();
      }
    }

    // Service Worker 登録 (iOS対応)
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').then(reg => {
          console.log('SW registered:', reg);
        }).catch(err => {
          console.error('SW registration failed:', err);
        });
      });
    }

    // 初期化
    function initApp() {
      const savedTheme = localStorage.getItem('golf_theme');
      if (savedTheme === 'light') setTheme('light');
      else setTheme('dark');
      
      const savedLang = localStorage.getItem('golf_lang');
      if (savedLang === 'en') setLanguage('en');
      else setLanguage('ja');
      
      document.getElementById('langBtn').addEventListener('click', () => {
        const newLang = currentLang === 'ja' ? 'en' : 'ja';
        setLanguage(newLang);
      });
      document.getElementById('themeBtn').addEventListener('click', () => {
        const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
        setTheme(newTheme);
      });
      
      renderList();
    }
    
    initApp();
  </script>
</body>
</html>
